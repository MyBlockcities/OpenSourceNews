name: Daily Influencer Discovery

on:
  schedule:
    - cron: "20 10 * * *"  # Daily after reports, manifests, and Qdrant exports
  workflow_dispatch:
    inputs:
      max_per_topic:
        description: "Maximum new influencers to add per topic"
        required: false
        default: "20"
      search_days:
        description: "YouTube lookback window in days"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: influencer-discovery
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAX_PER_TOPIC: ${{ github.event.inputs.max_per_topic || '20' }}
      SEARCH_DAYS: ${{ github.event.inputs.search_days || '7' }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YT_API_KEY: ${{ secrets.YT_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run influencer discovery
        run: |
          python3 scripts/discover_influencers.py \
            --max-per-topic "${MAX_PER_TOPIC}" \
            --search-days "${SEARCH_DAYS}"

      - name: Commit updated influencer data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/influencers/*.json
          if git diff --cached --quiet; then
            echo "No influencer changes to commit."
            exit 0
          fi
          git commit -m "chore: daily influencer discovery"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && exit 0
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          exit 1
