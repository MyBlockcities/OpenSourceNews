name: Build Report Manifest

on:
  workflow_run:
    workflows: ["Daily Research Briefing"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build manifest
        run: |
          mkdir -p outputs/manifests

          # Find the most recent daily report
          LATEST=$(ls -1 outputs/daily/*.json 2>/dev/null | sort -r | head -1)

          if [ -z "$LATEST" ]; then
            echo "No daily reports found"
            exit 0
          fi

          DATE=$(basename "$LATEST" .json)
          export LATEST DATE
          python3 << 'PY'
          import json
          import os
          from collections import Counter
          from datetime import datetime, timezone
          from pathlib import Path

          latest = Path(os.environ["LATEST"])
          with open(latest) as f:
              data = json.load(f)
          item_count = sum(len(v) for v in data.values())
          topics = list(data.keys())
          bucket_counts: Counter = Counter()
          for _topic, items in data.items():
              for it in items:
                  bucket_counts[it.get("bucket") or "unknown"] += 1

          out = {
              "latest_report_date": os.environ["DATE"],
              "latest_report_path": f"outputs/daily/{latest.stem}.json",
              "item_count": item_count,
              "topics": topics,
              "bucket_counts": dict(bucket_counts),
              "generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }
          Path("outputs/manifests").mkdir(parents=True, exist_ok=True)
          with open("outputs/manifests/latest.json", "w") as f:
              json.dump(out, f, indent=2)
          print(f"Manifest: {out['latest_report_date']} ({item_count} items)")
          PY

      - name: Commit manifest
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions-bot@users.noreply.github.com"
          git add outputs/manifests/latest.json || true
          git commit -m "Update report manifest" || echo "No changes to commit"
          git push
