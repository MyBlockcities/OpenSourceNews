name: Daily Research Briefing
on:
  schedule:
    - cron: "0 7 * * *" # Runs at 07:00 UTC every day
  workflow_dispatch: {} # Allows manual runs

permissions:
  contents: write # Needed to commit the report back to the repo

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  run-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run research pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YT_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          MAILAROO_API_KEY: ${{ secrets.MAILAROO_API_KEY }}
          MAILAROO_TO_EMAIL: ${{ secrets.MAILAROO_TO_EMAIL }}
          # X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          # X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          # Add other secrets for social media APIs here
        run: python pipelines/daily_run.py

      - name: Commit and push report
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions-bot@users.noreply.github.com"
          git add outputs/daily/*.json outputs/transcripts/*.json || true
          git commit -m "Daily intelligence report for $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push

      - name: Notify on failure
        if: failure()
        env:
          MAILAROO_API_KEY: ${{ secrets.MAILAROO_API_KEY }}
          MAILAROO_TO_EMAIL: ${{ secrets.MAILAROO_TO_EMAIL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$MAILAROO_API_KEY" ] && [ -n "$MAILAROO_TO_EMAIL" ]; then
            DATE=$(date -u +%Y-%m-%d)
            python3 -c "
          import sys, os
          sys.path.insert(0, '.')
          from services.mailaroo_emailer import send_text_email
          repo = os.environ['REPO']
          run_id = os.environ['RUN_ID']
          date = os.environ.get('DATE', 'unknown')
          send_text_email(
              body=f'The Daily Research Briefing pipeline failed. Check GitHub Actions for details: https://github.com/{repo}/actions/runs/{run_id}',
              subject=f'[OpenSourceNews] Daily pipeline FAILED - {date}'
          )
          " || echo "Failed to send failure notification email"
          else
            echo "No email credentials configured — skipping failure notification"
          fi
