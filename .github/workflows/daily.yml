name: Daily Research Briefing
on:
  schedule:
    - cron: "0 7 * * *" # Runs at 0 7 * * * UTC
  workflow_dispatch: {} # Allows manual runs

permissions:
  contents: write # Needed to commit the report back to the repo

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  run-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run research pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          # X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          # X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          # Add other secrets for social media APIs here
        run: python pipelines/daily_run.py

      - name: Commit and push report
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions-bot@users.noreply.github.com"
          git add outputs/daily/*.json outputs/daily/*.md || true
          git commit -m "Daily intelligence report for $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push
