name: Dispatch Receiver
on:
  repository_dispatch:
    types: [run-deep-research]

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run research pipeline
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YT_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          MAILAROO_API_KEY: ${{ secrets.MAILAROO_API_KEY }}
          MAILAROO_TO_EMAIL: ${{ secrets.MAILAROO_TO_EMAIL }}
        run: python pipelines/daily_run.py

      - name: Build mission briefs
        run: python pipelines/mission_briefs.py

      - name: Commit and push report
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions-bot@users.noreply.github.com"
          git add outputs/daily/*.json outputs/transcripts/*.json outputs/briefs || true
          git commit -m "Daily intelligence report for $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && exit 0
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          exit 1
