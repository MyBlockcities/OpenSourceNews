name: Daily Video Script Generation

on:
  schedule:
    - cron: "0 8 * * *"  # Daily 08:00 UTC (after daily report at 07:00)
  workflow_dispatch:
    inputs:
      no_commit:
        description: "Generate scripts without committing outputs."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: video-script
  cancel-in-progress: false

jobs:
  generate-script:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest reports
        run: git pull

      - name: Generate video script
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          OPENROUTER_API_KEY: ${{ (vars.LLM_PROVIDER == 'openrouter' || vars.LLM_PROVIDER == 'rotating') && secrets.OPENROUTER_API_KEY || '' }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openrouter/free' }}
          OPENROUTER_MAX_REQUESTS_PER_RUN: ${{ vars.OPENROUTER_MAX_REQUESTS_PER_RUN || '0' }}
          OPENROUTER_MIN_INTERVAL_SECONDS: ${{ vars.OPENROUTER_MIN_INTERVAL_SECONDS || '0' }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YT_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
        run: python pipelines/generate_video_script.py

      - name: Commit and push script
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.no_commit != 'true' }}
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions-bot@users.noreply.github.com"
          git add outputs/scripts/*.txt outputs/scripts/*.json || true
          git commit -m "Daily video script for $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && exit 0
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          MAILAROO_API_KEY: ${{ secrets.MAILAROO_API_KEY }}
          MAILAROO_TO_EMAIL: ${{ secrets.MAILAROO_TO_EMAIL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$MAILAROO_API_KEY" ] && [ -n "$MAILAROO_TO_EMAIL" ]; then
            DATE=$(date -u +%Y-%m-%d)
            python3 -c "
          import sys, os
          sys.path.insert(0, '.')
          from services.mailaroo_emailer import send_text_email
          repo = os.environ['REPO']
          run_id = os.environ['RUN_ID']
          date = os.environ.get('DATE', 'unknown')
          send_text_email(
              body=f'Video script generation failed. Check: https://github.com/{repo}/actions/runs/{run_id}',
              subject=f'[OpenSourceNews] Video script FAILED - {date}'
          )
          " || echo "Failed to send failure notification"
          fi
