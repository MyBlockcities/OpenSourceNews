# Frontend / static Vite deployment only.
# The Python API uses nixpacks.api.toml (or Railway build/start overrides); see docs/DEPLOYMENT.md.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "caddy file-server --listen :$PORT --root /app/dist"
healthcheckPath = "/"
healthcheckTimeout = 100

[env]
# Environment variables (set these in Railway dashboard)
# GEMINI_API_KEY = "your-key-here"
