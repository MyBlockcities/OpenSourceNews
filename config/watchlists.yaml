watchlists:
  - name: ai_agent_infra
    persona: "AI automation agency operator"
    entities:
      - OpenAI Agents SDK
      - Claude Code
      - LangGraph
      - CrewAI
      - MCP
      - OpenRouter
    topics:
      - AI
      - agents
    alert_rules:
      - new_release
      - funding
      - security_issue
      - repo_trending

  - name: real_estate_tokenization
    persona: "Real estate tokenization strategist"
    entities:
      - Securitize
      - Polymesh
      - Centrifuge
      - RealT
      - Lofty
      - RWA
    topics:
      - blockchain
      - real_estate
      - tokenization
    exclude_terms:
      - NLP
      - deep-learning
      - HuggingFace tokenizers
      - string tokenization
      - text tokenization
    alert_rules:
      - regulation
      - partnership
      - funding

  - name: health_wellness_peptides
    persona: "Health and wellness peptide brand operator"
    entities:
      - peptides
      - NAD+
      - BPC-157
      - GHK-Cu
      - KPV
      - GLP-1
      - semaglutide
      - tirzepatide
      - retatrutide
      - collagen peptides
      - thymosin alpha-1
      - oral strips
    topics:
      - health
      - wellness
      - longevity
      - peptides
      - metabolic_health
      - skin_health
      - recovery
    evidence_policy:
      truth_layer:
        - ClinicalTrials.gov
        - PubMed
        - FDA
      trend_layer:
        - YouTube
        - Hacker News
        - Reddit
      safe_framing:
        - educational
        - wellness_support
        - evidence_gap
      prohibited_framing:
        - disease_treatment_claim
        - dosing_protocol
        - approved_therapy_claim_without_fda_source
    exclude_terms:
      - vendor source
      - buy peptides
      - coupon code
      - source check
      - unverified protocol
    alert_rules:
      - research
      - clinical_trial
      - safety_warning
      - product_launch
      - regulation
      - evidence_upgrade
