# config/feeds.yaml
# Five major topic buckets for OpenSourceNews daily ingestion

topics:
  # ──────────────────────────────────────────────────────────
  # Bucket 1: General News & Research
  # Broad tech, open source, startup/product releases, macro platform shifts
  # ──────────────────────────────────────────────────────────
  - topic_name: "General News & Research"
    github_sources:
      - "typescript"
      - "python"
      - "rust"
    hackernews_sources:
      - "open source"
      - "startup funding"
      - "developer tools"
      - "tech industry"
    rss_sources:
      - "https://hnrss.org/frontpage"                             # Hacker News front page
      - "https://www.theverge.com/rss/index.xml"                  # The Verge
      - "https://techcrunch.com/feed/"                             # TechCrunch
      - "https://www.wired.com/feed/rss"                          # Wired
      - "https://arstechnica.com/feed/"                            # Ars Technica
    youtube_sources:
      - "@Fireship"                                                # Fireship - tech news
      - "@ThePrimeTimeagen"                                        # ThePrimeTime

  # ──────────────────────────────────────────────────────────
  # Bucket 2: AI / AI Tools / AI Agents
  # AI tools, agents, model releases, frameworks, evals, inference/training
  # ──────────────────────────────────────────────────────────
  - topic_name: "AI / AI Tools / AI Agents"
    github_sources:
      - "python"
    hackernews_sources:
      - "AI agent"
      - "LLM"
      - "GPT"
      - "machine learning"
    rss_sources:
      # Core AI Research & News
      - "https://blog.google/technology/ai/rss/"                   # Google AI Blog
      - "https://www.marktechpost.com/feed/"                       # MarkTechPost - AI News
      - "https://huggingface.co/blog/feed.xml"                     # HuggingFace Blog
      # AI Industry & Business
      - "https://www.artificialintelligence-news.com/feed/"        # AI News
      - "https://www.rundown.ai/rss"                               # The Rundown AI
      # Agent-Specific
      - "https://aiagent.marktechpost.com/feed/"                   # AI Agent News
    youtube_sources:
      - "@TwoMinutePapers"
      - "indydevdan"
      - "UC_x36zCEGilGpB1m-V4gmjg"                                # Arseny Shatokhin
      - "UCSv4qL8vmoSH7GaPjuqRiCQ"                                # Matthew Berman
      - "UCawZsQWqfGSbCI5yjkdVkTA"                                # WorldofAI
      - "UC2WmuBuFq6gL08QYG-JjXKw"                                # Matt Wolfe
      - "UCAl9Ld79qaZxp9JzEOwd3aA"                                # Additional AI channel
    x_sources:
      - "Sauain"
      - "levelsio"
      - "SwiftOnSecurity"
      - "_kaitoai"
      - "Marktechpost"

  # ──────────────────────────────────────────────────────────
  # Bucket 3: Blockchain / Crypto / DAOs / Tokenization / Web3
  # Crypto, tokenization, DAOs, wallets, custody, stablecoins, regulatory
  # ──────────────────────────────────────────────────────────
  - topic_name: "Blockchain / Crypto / Web3"
    github_sources:
      - "solana"
    hackernews_sources:
      - "crypto funding"
      - "blockchain funding"
      - "web3"
      - "tokenization"
    rss_sources:
      - "https://www.coindesk.com/arc/outboundfeeds/rss/?outputType=xml"  # CoinDesk
      - "https://cointelegraph.com/rss"                            # Cointelegraph
      - "https://dailycoin.com/feed/"                              # DailyCoin
      - "https://www.bankless.com/feed"                            # Bankless
      - "https://www.blockchainappfactory.com/blog/feed/"          # Blockchain App Factory
    youtube_sources:
      - "UChpleBmo18P08aKCIgti38g"                                 # BitBoy X
      - "UCuV9EB4I9L-xmRoaXd8tmuA"                                # Coin Bureau
      - "UCqK_GSMbpiV8spgD3ZGloSw"                                # Bankless
    x_sources:
      - "a16zcrypto"
      - "paradigm"
      - "multicoincap"
      - "cointelegraph"
      - "CoinLaunchSpace"
      - "TimBeiko"

  # ──────────────────────────────────────────────────────────
  # Bucket 4: Sense-Making & Narrative Analysis
  # Contested narratives, geopolitics, institutional critique,
  # alternative interpretations, media framing analysis
  # ──────────────────────────────────────────────────────────
  - topic_name: "Sense-Making & Narrative Analysis"
    hackernews_sources:
      - "geopolitics"
      - "misinformation"
      - "media analysis"
      - "institutional"
    rss_sources:
      - "https://www.bbc.co.uk/news/technology/rss.xml"           # BBC Tech (mainstream baseline)
      - "https://www.reuters.com/arc/outboundfeeds/v3/all/rss.xml"  # Reuters (mainstream baseline)
      - "https://www.lesswrong.com/feed.xml"                        # Long-form reasoning / epistemics
      - "https://www.astralcodexten.com/feed"                       # Slate Star Codex / ACX essays
      - "https://www.foreignaffairs.com/rss.xml"                    # International relations framing
    youtube_sources:
      - "@AllInPodcast"                                            # All-In Podcast
      - "@LexFridman"                                              # Long-form interviews
      - "@JohnnyHarris"                                            # Narrative / explainers

  # ──────────────────────────────────────────────────────────
  # Bucket 5: Alternative News & Independent Commentary
  # Personality-led, independent, non-institutional, or
  # opinion-heavy channels. Keep separate from mainstream/research
  # so downstream apps can label it as commentary needing review.
  # ──────────────────────────────────────────────────────────
  - topic_name: "Alternative News & Independent Commentary"
    youtube_sources:
      - "Ian Carroll"                                              # Independent commentary / investigative-style
      - "@joerogan"                                                # Joe Rogan Experience
      - "Dr David Martin"                                          # Alternative-health / institutional critique
      - "Danny Jones podcast"                                      # Interview-driven independent commentary
      - "Dr Jack Kruse"                                            # Health-focused alternative analysis
      - "The Align Podcast Aaron Alexander"                        # Health, movement, lifestyle commentary
      - "@TheDiaryOfACEO"                                          # Business, psychology, culture interviews
      - "@realCandaceOwens"                                        # Political commentary
      - "@TuckerCarlson"                                           # Political interviews/commentary
      - "Alex Jones"                                               # Highly controversial alternative commentary
      - "Dave Smith podcast"                                       # Libertarian political commentary/interviews
      - "@breakingpoints"                                          # Anti-establishment political coverage
      - "@Coffeezilla"                                             # Fraud/scam investigations
      - "@NickShirley"                                             # Street interviews / independent journalism
      - "@johnnyharris"                                            # Independent documentary explainers
      - "@tldrpodcasts"                                            # World news and policy summaries
      - "theindependent"                                           # Conventional independent newsroom

  # ──────────────────────────────────────────────────────────
  # Bucket 6: Peptides / Wellness / Longevity
  # Medically sensitive peptide research, safety, regulatory,
  # and market-demand signals. Keep truth-layer sources distinct
  # from trend/listening sources for downstream compliance review.
  # ──────────────────────────────────────────────────────────
  - topic_name: "Peptides / Wellness / Longevity"
    pubmed_sources:
      - "(peptides[Title/Abstract] OR peptide therapeutics[Title/Abstract]) AND wellness"
      - "BPC-157 peptide"
      - "GHK-Cu peptide"
      - "KPV peptide"
      - "NAD+ peptide"
      - "GLP-1 peptide"
      - "collagen peptides"
      - "thymosin alpha-1 peptide"
    clinical_trials_sources:
      - "peptide therapy"
      - "BPC-157"
      - "GHK-Cu"
      - "NAD+"
      - "GLP-1"
      - "collagen peptides"
      - "semaglutide peptide"
      - "tirzepatide"
      - "retatrutide"
    hackernews_sources:
      - "peptides"
      - "GLP-1"
      - "longevity"
      - "FDA peptide"
    rss_sources:
      - "https://erictopol.substack.com/feed"                      # Ground Truths / medical interpretation
    youtube_sources:
      - "Ben Greenfield peptides"                                  # Trend/listening only
      - "Dave Asprey peptides"                                      # Trend/listening only
      - "peptides physician lecture"                                # Educational/trend monitoring
      - "GLP-1 peptide science"                                     # Educational/trend monitoring
